name: Run Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Mint a token for the release bot
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: main
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

  # Build and attach the plugin tarball in the same workflow, gated on a release
  # actually being cut. Runs only when release-please created a release.
  package:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mint a token for the release bot
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The app token (not GITHUB_TOKEN) so the Artifact Hub metadata commit below can
          # push back to main the same way release-please pushes release commits.
          token: ${{ steps.app-token.outputs.token }}
          ref: main
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build and package the plugin
        run: |
          npm run build
          npm run package
      - name: Generate checksum
        run: |
          TARBALL="$(ls ./*.tar.gz | head -1)"
          shasum -a 256 "$TARBALL" | awk '{print $1}' > "$TARBALL.sha256"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
      - name: Upload the tarball to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "$TARBALL" "$TARBALL.sha256" --clobber
      # Generate this version's Artifact Hub package metadata from the released tarball's URL
      # and sha256 (which only exist now, post-release), then commit it back to main so
      # Artifact Hub picks it up on its next scan. A chore commit — release-please ignores it,
      # so it does not cut another release or re-trigger this job.
      - name: Generate and commit the Artifact Hub package metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG#headlamp-openfeature-v}"
          ARCHIVE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/$(basename "$TARBALL")"
          node scripts/gen-artifacthub-pkg.mjs \
            --version "$VERSION" \
            --tag "$TAG" \
            --archive-url "$ARCHIVE_URL" \
            --checksum "$(cat "$TARBALL.sha256")" \
            --created-at "$(gh release view "$TAG" --json publishedAt --jq .publishedAt)"
          git config user.name "Jason Benedicic"
          git config user.email "48251655+jabenedicic@users.noreply.github.com"
          git add "artifacthub/headlamp-openfeature/${VERSION}/artifacthub-pkg.yml"
          if git diff --cached --quiet; then
            echo "Artifact Hub metadata already up to date for ${VERSION}."
          else
            git commit --signoff -m "chore: add Artifact Hub metadata for ${TAG}"
            git push origin HEAD:main
          fi
