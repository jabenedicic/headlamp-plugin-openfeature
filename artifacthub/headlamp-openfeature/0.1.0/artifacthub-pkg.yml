  artifacthub.io/install: |
    Install by placing the plugin's folder in Headlamp's plugins directory and
    restarting Headlamp:

    1. Download `headlamp-openfeature-0.1.0.tar.gz` from the release and extract it
       into your Headlamp plugins directory (its location varies by platform).
    2. Restart Headlamp. An **OpenFeature Operator** entry appears in the sidebar.

    The plugin needs the [OpenFeature Operator](https://github.com/open-feature/open-feature-operator)
    installed on the target cluster. See Headlamp's
    [plugin installation guide](https://headlamp.dev/docs/latest/installation/plugins/)
    for the exact per-platform directory.
  artifacthub.io/changes: |
    - browse the four OpenFeature Operator CRDs from a native "OpenFeature Operator" sidebar with list and detail views
    - create, edit, and delete resources through Headlamp's native Monaco editor and delete confirmation
    - detect a missing OpenFeature Operator and show install guidance instead of an empty table
    - flag-set aware list summaries (e.g. "2 enabled · 1 disabled") and per-flag detail views with lossless variant rendering
    - ship reference manifests for all four CRDs, viewer/editor RBAC examples, and a compatibility matrix
