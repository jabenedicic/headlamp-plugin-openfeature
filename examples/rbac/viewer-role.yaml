# SPDX-License-Identifier: Apache-2.0
#
# Read-only access to every OpenFeature Operator CRD. The plugin's native actions
# self-gate on RBAC, so a viewer sees the lists and details without write controls.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openfeature-viewer
rules:
  - apiGroups: ["core.openfeature.dev"]
    resources:
      - featureflags
      - featureflagsources
      - flagds
      - inprocessconfigurations
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openfeature-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openfeature-viewer
subjects:
  - kind: Group
    name: openfeature-viewers
    apiGroup: rbac.authorization.k8s.io
